<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mark Walhimer Studio — Generative Art</title>
  <link rel="stylesheet" href="shared-assets/css/tokens.css">
  <style>
    body { background: #18160f; color: #efe9df; font-family: sans-serif; padding: 60px; }
    h1 { font-size: 40px; font-weight: 300; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; margin-top: 40px; }
    .card { border: 1px solid rgba(255,255,255,0.1); padding: 20px; text-decoration: none; color: inherit; transition: 0.2s; }
    .card:hover { border-color: #a8864e; background: #22201a; }
    .card h2 { font-size: 18px; margin: 0 0 10px 0; color: #a8864e; }
    .card p { font-size: 12px; opacity: 0.6; margin: 0; }
  </style>
</head>
<body>
  <h1>Mark Walhimer <em>Studio</em></h1>
  <div class="grid">
    <a href="art/bloom-release/" class="card"><h2>Bloom / Release</h2><p>Seeded DNA lifecycle study.</p></a>
    <a href="art/traveling-landscape/" class="card"><h2>Traveling Landscape</h2><p>Infinite 3D terrain generation.</p></a>
    <a href="art/surrender-machines/" class="card"><h2>Surrender Machines</h2><p>Emotional mechanical study.</p></a>
    <a href="art/shared-ground/" class="card"><h2>Shared Ground</h2><p>Relational social geometry.</p></a>
    <a href="art/living-commons/" class="card"><h2>Living Commons</h2><p>Touch-based co-presence piece.</p></a>
  </div>
