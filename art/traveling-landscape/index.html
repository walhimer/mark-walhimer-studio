<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Traveling Landscape — Mark Walhimer</title>
  <link rel="stylesheet" href="../../shared-assets/css/tokens.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.11/p5.min.js"></script>
  <script src="../../shared-assets/js/dna.js"></script>
  <style>body{background:#18160f;margin:0;overflow:hidden;}</style>
</head>
<body><script>
let rng; let camZ = 0;
function setup(){ 
  createCanvas(windowWidth, windowHeight, WEBGL); 
  rng = new Rand(Date.now() % 99991);
}
function draw(){
  background(24, 22, 15); camZ -= 5;
  camera(0, -200, camZ, 0, 0, camZ-1000, 0, 1, 0);
  for(let z=0; z<15; z++){
    push(); translate(sin(z)*400, 0, camZ-(z*800));
    fill(168, 134, 78, 150); noStroke();
    box(150, 400, 150); pop();
  }
  if(camZ < -12000) camZ = 0;
}
function windowResized(){ resizeCanvas(windowWidth, windowHeight); }
</script></body></html>
