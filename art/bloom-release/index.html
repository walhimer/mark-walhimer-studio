<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Bloom / Release — Mark Walhimer</title>
  <link rel="stylesheet" href="../../shared-assets/css/tokens.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script src="../../shared-assets/js/dna.js"></script>
  <style>
    body { background: var(--deep); margin: 0; overflow: hidden; font-family: var(--sans); }
    #lifebar-wrap { position: fixed; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--rule-dark); }
    #lifebar { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s linear; }
  </style>
</head>
<body>
<div id="lifebar-wrap"><div id="lifebar"></div></div>
<script>
"use strict";
const PENTA_POOL = ['C2','D2','E2','G2','A2','C3','D3','E3','G3','A3','C4','D4','E4','G4','A4','C5','D5','E5','G5','A5','C6','D6'];
function shufflePool(r){let p=[...PENTA_POOL];for(let i=p.length-1;i>0;i--){const j=Math.floor(r.range(0,i+1));[p[i],p[j]]=[p[j],p[i]];}return p;}
let horn; let hornReady=false;
function buildHorn(){if(hornReady)return;hornReady=true;horn=new Tone.Sampler({urls:{C2:'C2.mp3',C3:'C3.mp3',C4:'C4.mp3',C5:'C5.mp3'},release:5,baseUrl:'https://tonejs.github.io/audio/salamander/'}).toDestination();}
function hsbToRgb(h,s,b){s/=100;b/=100;const k=n=>(n+h/60)%6;const f=n=>b-b*s*Math.max(0,Math.min(k(n),4-k(n),1));return [f(5),f(3),f(1)];}
function rgbaStr(rgb,a){return `rgba(${(rgb[0]*255)|0},${(rgb[1]*255)|0},${(rgb[2]*255)|0},${a.toFixed(3)})`;}

class Bloom {
  constructor(rng,W,H,note){
    this.x=rng.range(W*0.1,W*0.9);this.y=rng.range(H*0.1,H*0.9);
    const h0=rng.range(0,360);
    this.c1=hsbToRgb(h0,rng.range(80,100),100);
    this.c2=hsbToRgb((h0+rng.range(30,80))%360,rng.range(70,95),100);
    this.c3=hsbToRgb((h0+rng.range(140,200))%360,rng.range(60,85),95);
    this.maxR=rng.range(80,200);this.layerCount=Math.floor(rng.range(4,8));
    this.layers=Array.from({length:this.layerCount},(_,i)=>({dx:rng.range(-12,12),dy:rng.range(-12,12),rScale:1.0-i*(0.38/this.layerCount),alpha:0.35-i*(0.06/this.layerCount)}));
    this.breathAmp=rng.range(0.05,0.10);this.breathSpeed=rng.range(0.6,1.5);this.breathPhase=rng.range(0,Math.PI*2);
    this.note=note;this.growSpeed=rng.range(0.018,0.038);this.currentR=0;this.growing=true;this.dying=false;this.fadeAlpha=1.0;this.fadeSpeed=rng.range(0.0008,0.002);this.dead=false;
  }
  update(dt){
    if(this.growing){this.currentR+=this.maxR*this.growSpeed*(dt/16.67);if(this.currentR>=this.maxR){this.currentR=this.maxR;this.growing=false;}}
    if(this.dying){this.fadeAlpha-=this.fadeSpeed*(dt/16.67);if(this.fadeAlpha<=0)this.dead=true;}
  }
  draw(ctx,t){
    if(this.dead)return;const breath=1.0+this.breathAmp*Math.sin(t*0.001*this.breathSpeed+this.breathPhase);
    const r=this.currentR*(this.growing?1.0:breath);if(r<1)return;
    for(const L of this.layers){
      const cx=this.x+L.dx*(r/this.maxR);const cy=this.y+L.dy*(r/this.maxR);const lr=r*L.rScale;const la=L.alpha*this.fadeAlpha;
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,lr);
      grad.addColorStop(0.0,rgbaStr(this.c1,la*0.95));grad.addColorStop(0.3,rgbaStr(this.c2,la*0.60));grad.addColorStop(0.7,rgbaStr(this.c3,la*0.28));grad.addColorStop(1.0,rgbaStr(this.c3,0));
      ctx.beginPath();ctx.arc(cx,cy,lr,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    }
  }
}

const rng=new Rand(Date.now()%99991);
let blooms=[];let spawnCount=0;let nextSpawn=600;let gardenFull=false;let fullAt=-1;let dyingStarted=false;let startTime=null;let noteAssignments=shufflePool(rng);

function setup(){createCanvas(windowWidth,windowHeight); }
function draw(){
  const t=millis();const dt=16.67;if(!startTime)startTime=t;
  drawingContext.fillStyle='#18160f';drawingContext.fillRect(0,0,width,height);
  if(spawnCount<22 && t>nextSpawn){
    let b = new Bloom(rng,width,height,noteAssignments[spawnCount]);
    blooms.push(b); if(hornReady)horn.triggerAttackRelease(b.note,'2n');
    spawnCount++;nextSpawn=t+1800;if(spawnCount==22){gardenFull=true;fullAt=t;}
  }
  if(gardenFull && !dyingStarted && t>fullAt+8000){
    dyingStarted=true;[...blooms].reverse().forEach((b,i)=>{setTimeout(()=>b.dying=true,i*600);});
  }
  blooms.forEach(b=>b.update(dt));blooms.sort((a,b)=>b.maxR-a.maxR).forEach(b=>b.draw(drawingContext,t));
  document.getElementById('lifebar').style.width=(Math.min((t-startTime)/80000*100,100))+'%';
}
document.addEventListener('click',()=>{Tone.start();buildHorn();},{once:true});
</script></body></html>
