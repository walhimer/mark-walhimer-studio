<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Bloom / Release — Mark Walhimer</title>
  <link rel="stylesheet" href="../../shared-assets/css/tokens.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.11/p5.min.js"></script>
  <script src="../../shared-assets/js/dna.js"></script>
  <style>body{background:var(--deep);margin:0;overflow:hidden;}#lifebar{position:fixed;bottom:0;left:0;height:3px;background:var(--accent);width:0%;}</style>
</head>
<body><div id="lifebar"></div>
<script>
const rng = new Rand(Date.now() % 99991); let blooms = [];
function setup(){createCanvas(windowWidth,windowHeight);colorMode(HSB,360,100,100,1);}
function draw(){
  background(24,22,15);
  if(frameCount%100==0 && blooms.length<22) blooms.push({x:rng.range(width*0.1,width*0.9),y:rng.range(height*0.1,height*0.9),h:rng.range(0,360),r:0,max:rng.range(80,200)});
  blooms.forEach(b=>{ if(b.r<b.max)b.r+=0.5; fill(b.h,70,90,0.4); noStroke(); ellipse(b.x,b.y,b.r+sin(frameCount*0.02)*10);});
  document.getElementById('lifebar').style.width=(blooms.length/22*100)+'%';
}
</script></body></html>
