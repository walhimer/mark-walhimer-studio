<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Living Commons — Mark Walhimer</title>
  <link rel="stylesheet" href="../../shared-assets/css/tokens.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --gray: #888; --light: #e8e8e8; --bg: #f9f9f7; }
    body { background: var(--bg); color: var(--black); font-family: serif; line-height: 1.65; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; background: rgba(249,249,247,0.92); border-bottom: 1px solid var(--light); }
    .hero { padding: 140px 40px 80px; max-width: 820px; margin: 0 auto; }
    h1 { font-size: clamp(42px, 7vw, 72px); margin-bottom: 36px; }
    h1 em { font-style: italic; }
    #art-stage { width: 100%; aspect-ratio: 16/9; background: #fff; border: 1px solid var(--light); margin: 0 auto; max-width: 820px; }
  </style>
</head>
<body>
  <nav><a style="font-family:sans-serif; font-size:11px; text-transform:uppercase; color:var(--gray); text-decoration:none;" href="#">Mark Walhimer</a></nav>
  <section class="hero">
    <p style="font-family:sans-serif; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gray); margin-bottom:32px;">Interactive Installation / 2026</p>
    <h1>Living <em>Commons</em></h1>
    <p style="font-size:17px; color:#2a2a2a;">What does it mean to share space in the digital age? The commons is not a metaphor.</p>
  </section>
  <div id="art-stage"></div>
  <script>
    let touches=[];
    function setup(){ const stage=document.getElementById('art-stage'); const cnv=createCanvas(stage.offsetWidth, stage.offsetHeight); cnv.parent('art-stage'); }
    function draw(){ background(249,249,247); touches.forEach(t=>{ fill(168,134,78,t.a/100); noStroke(); ellipse(t.x,t.y,t.r); t.r+=2; t.a-=2; }); touches=touches.filter(t=>t.a>0); }
    function mousePressed(){ touches.push({x:mouseX, y:mouseY, r:10, a:100}); }
  </script>
</body>
</html>
